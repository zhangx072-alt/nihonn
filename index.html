<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>生日快乐</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "微软雅黑";
    color: white;
    text-align: center;
}

.box {
    background: rgba(0,0,0,0.3);
    padding: 40px;
    border-radius: 20px;
}

/* 图片样式 */
img {
    width: 180px;
    border-radius: 50%;
    border: 5px solid white;
    box-shadow: 0 0 20px rgba(255,255,255,0.8);
    margin: 20px 0;
}

h1 { font-size: 40px; }
p { font-size: 20px; }

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: pink;
    cursor: pointer;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="box">
    <h1>🎂 孙靖珊生日快乐！</h1>

    <img src="cake.png">

    <p>愿你每天都开心✨</p>

    <button onclick="showWish()">点我一下 💌</button>

    <!-- 💌 隐藏祝福 -->
    <p id="wish" style="display:none; margin-top:20px; font-size:22px;">
        🎉 祝你生日快乐！愿所有美好都围绕着你 ❤️
    </p>
</div>

<!-- 🎵 音乐 -->
<audio id="music" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
document.body.addEventListener('click', function() {
    document.getElementById("music").play();
});

function showWish() {
    document.getElementById("wish").style.display = "block";
}
</script>

</body>
</html>
